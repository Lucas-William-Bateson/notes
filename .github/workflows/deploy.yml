name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
  schedule:
    - cron: '0 6 * * 1' # Weekly rebuild — Monday 6am UTC

jobs:
  deploy:
    uses: Lucas-William-Bateson/actions/.github/workflows/dokku-deploy.yml@main
    with:
      app: blog
      dockerfile: docker/Dockerfile
      port: '80'
    secrets: inherit
